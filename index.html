<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --base: #0a0a0a;
            --surface0: #161616;
            --overlay0: #666666;
            --text: #ededed;
            --bright: #ffffff;
            --border-alpha: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            background-color: var(--base); 
            overflow-x: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 440px;
            text-align: center;
            padding: 40px 0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            object-fit: cover;
            margin-bottom: 20px;
            filter: grayscale(100%);
        }

        h1 {
            font-size: 26px;
            margin: 0 0 20px 0;
            font-weight: 800;
            color: var(--bright);
            letter-spacing: -1px;
        }

        .about-box {
            background: rgba(22, 22, 22, 0.4); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-alpha);
            padding: 22px;
            border-radius: 12px;
            margin-bottom: 25px;
            text-align: left;
        }

        .about-box h3 {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: var(--bright);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .about-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .about-box li {
            font-size: 12px;
            color: #b3b3b3;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
        }

        .about-box li::before {
            content: "—";
            color: var(--overlay0);
            margin-right: 10px;
            flex-shrink: 0;
        }

        .about-box strong {
            color: var(--bright);
            font-weight: 800;
        }

        
        .links-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        
        .btn {
            text-decoration: none;
            color: var(--text);
            background: rgba(22, 22, 22, 0.3);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-alpha);
            padding: 16px 12px;
            border-radius: 16px; 
            display: flex;
            align-items: center;
            justify-content: center; 
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1.5px;
        }

        .btn i {
            font-size: 15px;
            color: var(--overlay0);
            transition: color 0.3s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.25);
            color: var(--bright);
            transform: translateY(-1px);
        }

        .btn:hover i {
            color: var(--bright);
        }

        
        .btn:last-child:nth-child(odd) {
            grid-column: span 2;
        }

        footer {
            margin-top: 50px;
            font-size: 10px;
            color: var(--overlay0);
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="avatar.png?v=1" alt="wade" class="avatar">
        
        <h1>I'm wade</h1>

        <div class="about-box">
            <h3>Beginner DevSecOps Specialist</h3>
            <ul>
                <li>
                    <span>Focused on <strong>Database Management</strong> and backend logic</span>
                </li>
                <li>
                    <span>Dedicated to <strong>Information Security</strong> best practices</span>
                </li>
                <li>
                    <span><strong>Aspiring to become a DevSecOps Senior</strong></span>
                </li>
            </ul>
        </div>

        <div class="links-list">
            <a href="https://t.me/wades" class="btn" target="_blank">
                <i class="fab fa-telegram-plane"></i>
                Telegram
            </a>
            <a href="https://t.me/edgyteen" class="btn" target="_blank">
                <i class="fas fa-bullhorn"></i>
                Channel
            </a>
            <a href="https://github.com/couplesuicide" class="btn" target="_blank">
                <i class="fab fa-github"></i>
                GitHub
            </a>
            <a href="mailto:couplesuicide@proton.me" class="btn">
                <i class="fas fa-envelope"></i>
                Email
            </a>
            <a href="https://connecto.lol/pugvpn" class="btn" target="_blank">
                <i class="fas fa-key"></i>
                VPN Project
            </a>
        </div>

        <footer>
            ~/
        </footer>
    </div>

</body>
</html>
