<!DOCTYPE html>
<html lang="ru">

        <span id="icon-muted">🔇</span>
        <span id="icon-playing" class="hidden">🎵</span>
    </button>

        <h1 class="username">wades</h1>

        <div class="info-list">
            <a href="https://t.me/wades" target="_blank" class="info-item">
                <span class="label">direct me</span>
                <span class="value">t.me/wades</span>
            </a>
            <a href="https://t.me/slvtc" target="_blank" class="info-item">
                <span class="label">channel</span>
                <span class="value">t.me/slvtc</span>
            </a>
            <a href="https://github.com/wwades" target="_blank" class="info-item">
                <span class="label">github</span>
                <span class="value">github.com/wwades</span>
            </a>
            <a href="mailto:couplesuicide@proton.me" class="info-item">
                <span class="label">mail</span>
                <span class="value">couplesuicide@proton.me</span>
            </a>
            <a href="https://pug-vpn.github.io" target="_blank" class="info-item">
                <span class="label">vpn project</span>
                <span class="value">pug-vpn.github.io</span>
            </a>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
