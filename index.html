    <style>
        :root {
            --base: #1e1e2e;
            --surface0: #313244;
            --overlay0: #6c7086;
            --text: #cdd6f4;
            --blue: #89b4fa;
            --teal: #94e2d5;
            --lavender: #b4befe;

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text);
            background-color: #11111b; 
            overflow-x: hidden;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 440px;
            text-align: center;
            padding: 40px 0;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 1px solid rgba(180, 190, 254, 0.3);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 25px 0;
            font-weight: 800;
            color: rgb(147, 164, 190);
            letter-spacing: -1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        h1 img {
            width: 32px;
        }

        
        .about-box {
            background: rgba(49, 50, 68, 0.3); 
            backdrop-filter: blur(25px) saturate(170%);
            -webkit-backdrop-filter: blur(25px) saturate(170%);
            border: 1px solid rgba(205, 214, 244, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: left;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .about-box h3 {
            margin: 0 0 15px 0;
            font-size: 15px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .about-box h3 img {
            width: 24px;
        }

        .about-box ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .about-box li {
            font-size: 12px;
            color: rgb(146, 163, 189);
            display: flex;
            align-items: center;
            gap: 12px;
            line-height: 1.4;
        }

        .about-box li img {
            width: 20px;
            flex-shrink: 0;
        }

        .about-box strong {
            color: var(--lavender);
            font-weight: 800;
        }

        .links-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        
        .btn {
            text-decoration: none;
            color: var(--text);
            background: rgba(49, 50, 68, 0.3);
            backdrop-filter: blur(25px) saturate(170%);
            -webkit-backdrop-filter: blur(25px) saturate(170%);
            border: 1px solid rgba(205, 214, 244, 0.05);
            padding: 18px 25px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 18px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
        }

        .btn i {
            font-size: 18px;
            width: 24px;
            color: rgb(146, 163, 189);
            opacity: 0.8;
        }

        .btn:hover {
            background: rgba(137, 180, 250, 0.1);
            border-color: rgba(137, 180, 250, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        footer {
            margin-top: 50px;
            font-size: 10px;
            color: var(--overlay0);
            letter-spacing: 4px;
        }
    </style>
</head>
