<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wade</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0d0d0d;
            --text-main: #e0e0e0;
            --text-muted: #777777;
            --accent: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
            background-color: var(--bg); 
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 400px;
            padding: 40px 0;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            filter: grayscale(100%);
        }

        .title h1 {
            font-size: 24px;
            margin: 0 0 5px 0;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .title p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        .about {
            margin-bottom: 40px;
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-muted);
        }

        .about strong {
            color: var(--text-main);
            font-weight: 500;
        }

        .links-list {
            display: flex;
            flex-direction: column;
        }

        .btn {
            text-decoration: none;
            color: var(--text-muted);
            padding: 16px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.2s ease;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .btn:first-child {
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .btn i {
            font-size: 16px;
            width: 20px;
            text-align: center;
            color: var(--text-muted);
            transition: color 0.2s ease;
        }

        .btn:hover {
            color: var(--accent);
            padding-left: 10px;
            border-bottom-color: rgba(255,255,255,0.2);
        }

        .btn:hover i {
            color: var(--accent);
        }

        footer {
            margin-top: 40px;
            font-size: 12px;
            color: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="avatar.png?v=1" alt="wade" class="avatar">
            <div class="title">
                <h1>wade.</h1>
                <p>Beginner DevSecOps Specialist</p>
            </div>
        </div>

        <div class="about">
            Focused on <strong>Database Management</strong> and backend logic.<br>
            Dedicated to <strong>Information Security</strong> best practices.<br>
            Aspiring to become a <strong>DevSecOps Senior</strong>.
        </div>

        <div class="links-list">
            <a href="https://t.me/wades" class="btn" target="_blank">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://t.me/edgyteen" class="btn" target="_blank">
                <i class="fas fa-bullhorn"></i> Channel
            </a>
            <a href="https://github.com/couplesuicide" class="btn" target="_blank">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="mailto:couplesuicide@proton.me" class="btn">
                <i class="fas fa-envelope"></i> Email
            </a>
            <a href="https://connecto.lol/pugvpn" class="btn" target="_blank">
                <i class="fas fa-key"></i> VPN Project
            </a>
        </div>

        <footer>~/</footer>
    </div>

</body>
</html>
